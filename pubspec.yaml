name: voice_app
description: Voice Notes App with Speech-to-Text, Local Storage, Search & Dark Mode
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Speech Recognition
  speech_to_text: ^7.3.0

  # Local Storage (Hive)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # State Management
  provider: ^6.1.5+1

  # Date Formatting
  intl: ^0.20.2

  # Permission Handling
  permission_handler: ^12.0.1

  # Theme Persistence
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Hive Code Generation
  hive_generator: ^2.0.1
  build_runner: ^2.4.13


flutter:
  uses-material-design: true